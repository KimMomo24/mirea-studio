<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mirea Studio — Area Riservata</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FDFCF8;font-family:'Montserrat',sans-serif;color:#1A1A1A}
#root{min-height:100vh}
.serif{font-family:'Playfair Display',serif!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.fade-up{animation:fadeUp .4s ease both}
.scale-in{animation:scaleIn .35s ease both}
.btn-primary{background:#1A1A1A;color:#fff;padding:14px 28px;font-size:11px;letter-spacing:.15em;font-weight:700;font-family:'Montserrat',sans-serif;border:none;cursor:pointer;transition:background .2s;width:100%}
.btn-primary:hover{background:#5F6F52}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-ghost{background:transparent;color:#1A1A1A;border:1px solid #D4CFC4;padding:10px 20px;font-size:11px;letter-spacing:.12em;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
.btn-danger{background:transparent;color:#c0392b;border:1px solid #e0b0aa;padding:8px 16px;font-size:11px;letter-spacing:.1em;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s}
.btn-danger:hover{background:#c0392b;color:#fff}
.btn-success{background:transparent;color:#5F6F52;border:1px solid #b5c4ad;padding:8px 16px;font-size:11px;letter-spacing:.1em;font-weight:600;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all .2s}
.btn-success:hover{background:#5F6F52;color:#fff}
.input-field{width:100%;background:#F5F4F0;border:1px solid transparent;padding:12px 16px;font-size:13px;font-family:'Montserrat',sans-serif;outline:none;transition:border-color .2s;color:#1A1A1A}
.input-field:focus{border-color:#D4CFC4;background:#fff}
.card{background:#fff;border:1px solid #E8E4D9}
.tag{display:inline-block;font-size:9px;letter-spacing:.14em;font-weight:700;padding:3px 10px;text-transform:uppercase}
.tag-green{background:#EEF2EB;color:#5F6F52}
.tag-red{background:#FDF0EE;color:#b94a40}
.tag-yellow{background:#FDF8EE;color:#a07838}
.tag-gray{background:#F0EFED;color:#888}
.tag-blue{background:#EEF0F8;color:#3a4a7a}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#F5F4F0}
::-webkit-scrollbar-thumb{background:#D4CFC4;border-radius:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,.6);z-index:1000;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(4px)}
.modal-box{background:#fff;border:1px solid #D4CFC4;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:24px 20px;position:relative;border-radius:16px 16px 0 0}
.sidebar{background:#1A1A1A;height:100vh;width:240px;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;overflow-y:auto}
.sidebar-item{padding:12px 24px;font-size:11px;letter-spacing:.12em;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;text-transform:uppercase;color:#A0A09A}
.sidebar-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sidebar-item.active{background:rgba(95,111,82,.25);color:#A8BC9A}
.progress-bar{height:3px;background:#E8E4D9;overflow:hidden}
.progress-fill{height:100%;background:#1A1A1A;transition:width .5s ease}
.history-item{border-left:2px solid #E8E4D9;padding:4px 0 4px 16px;position:relative;margin-bottom:14px}
.counter-btn{width:32px;height:32px;background:#F5F4F0;border:1px solid #E8E4D9;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;color:#1A1A1A;flex-shrink:0}
.counter-btn:hover{background:#1A1A1A;color:#fff}
.spinner{width:24px;height:24px;border:2px solid #E8E4D9;border-top-color:#1A1A1A;border-radius:50%;animation:spin .7s linear infinite;margin:60px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-btn{background:none;border:none;cursor:pointer;padding:10px 16px;font-size:10px;letter-spacing:.14em;font-weight:700;font-family:'Montserrat',sans-serif;color:#A0A09A;border-bottom:2px solid transparent;transition:color .2s;white-space:nowrap}
.tab-btn.active{color:#1A1A1A;border-bottom-color:#1A1A1A}
.info-box{background:#F5F4F0;border-left:3px solid #D4CFC4;padding:14px 18px;font-size:11px;color:#666;line-height:1.7}
.upload-area{border:2px dashed #D4CFC4;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#FDFCF8}
.upload-area:hover{border-color:#1A1A1A;background:#F5F4F0}
/* mobile nav bar (admin) */
.mobile-nav{display:none;background:#1A1A1A;padding:0;position:sticky;top:0;z-index:200}
.mobile-nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.mobile-nav-items{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.mobile-nav-item{flex:1;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#A0A09A;font-size:8px;letter-spacing:.1em;font-weight:700;text-transform:uppercase;border:none;background:none;font-family:'Montserrat',sans-serif}
.mobile-nav-item.active{color:#A8BC9A}
/* RESPONSIVE */
@media(max-width:640px){
  .modal-overlay{align-items:flex-end;padding:0}
  .modal-box{border-radius:16px 16px 0 0;max-height:88vh;padding:24px 16px}
  .sidebar{display:none}
  .mobile-nav{display:block}
  .admin-main{padding:20px 14px!important}
  .client-content{padding:24px 14px!important}
  .client-header{padding:12px 16px!important}
  .viewer-box{border-radius:16px 16px 0 0;max-height:92vh}
  .feed-grid{gap:1px}
}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.feed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.feed-cell{aspect-ratio:4/5;position:relative;background:#efefef;overflow:hidden;cursor:pointer}
.feed-cell img,.feed-cell video{width:100%;height:100%;object-fit:cover;display:block}
.feed-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);color:#fff;border-radius:3px;font-size:9px;padding:2px 5px;font-weight:700}
.feed-draft{position:absolute;top:5px;left:5px;background:rgba(255,165,0,.85);color:#fff;border-radius:3px;font-size:9px;padding:2px 5px;font-weight:700}
.viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.viewer-box{background:#fff;border-radius:12px;width:100%;max-width:480px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column}
.viewer-media{position:relative;aspect-ratio:4/5;background:#000;overflow:hidden;flex-shrink:0}
.viewer-media img,.viewer-media video{width:100%;height:100%;object-fit:cover}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:5}
.car-btn.prev{left:8px}.car-btn.next{right:8px}
.car-btn:disabled{opacity:.2;pointer-events:none}
.car-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:4px;z-index:5}
.car-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}
.car-dot.active{background:#fff;width:14px;border-radius:3px}
.viewer-info{padding:14px 16px;overflow-y:auto;flex:1}
.type-btn{flex:1;padding:10px;border:1px solid #D4CFC4;border-radius:8px;background:#fff;cursor:pointer;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:600;color:#888;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .15s}
.type-btn.active{border-color:#1A1A1A;background:#1A1A1A;color:#fff}
.slide-thumb-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0}
.slide-thumb{width:56px;aspect-ratio:4/5;border-radius:6px;overflow:hidden;border:1px solid #E8E4D9;background:#f0f0f0;position:relative;flex-shrink:0}
.slide-thumb img,.slide-thumb video{width:100%;height:100%;object-fit:cover}
.slide-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const {createClient} = supabase;
const SB_URL = 'https://klczaixlnevzellhqgob.supabase.co';
const SB_KEY = 'sb_publishable_b6fDtA5UYnHfvZQUw4jQ3w_lCZjqipD';
const sb = createClient(SB_URL, SB_KEY);
const ADMIN_EMAIL = 'admin@mirea.studio';
const BUCKET = 'feed-media';

function today(){return new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}

async function uploadFile(file,folder){
  const ext=file.name.split('.').pop();
  const path=folder+'/'+Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
  const{data,error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true});
  if(error)throw error;
  const{data:{publicUrl}}=sb.storage.from(BUCKET).getPublicUrl(data.path);
  return publicUrl;
}

const Ico={
  Out:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  Plus:({s=15})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Back:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>,
  Edit:()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
  Trash:()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  X:({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Users:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Bell:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  Clock:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  File:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
  IG:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>,
  Work:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  Photo:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
  Video:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>,
  Carousel:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>,
  Eye:()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  EyeOff:()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
  Play:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  Upload:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  Check:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
  Pen:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
};

function Modal({open,onClose,title,children,wide}){
  if(!open)return null;
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box scale-in" style={{maxWidth:wide?720:560}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <h3 className="serif" style={{fontSize:20}}>{title}</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#888'}}><Ico.X s={18}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}
function Logo(){
  return(
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:30,height:30,border:'1px solid #D4CFC4',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <span className="serif" style={{fontSize:15,color:'#5F6F52',fontStyle:'italic'}}>m</span>
      </div>
      <span className="serif" style={{fontSize:14,color:'#1A1A1A'}}>Mirea Studio</span>
    </div>
  );
}
function HDot({type}){
  const c={delivery:'#5F6F52',request:'#3a4a7a',extra:'#a07838',info:'#888',admin:'#1A1A1A',warning:'#b94a40',feedback:'#5F6F52'};
  return <span style={{width:7,height:7,borderRadius:'50%',background:c[type]||'#888',position:'absolute',left:-4.5,top:8}}/>;
}
function Field({label,children}){
  return(
    <div style={{marginBottom:12}}>
      <label style={{fontSize:9,letterSpacing:'.12em',color:'#888',display:'block',marginBottom:4,fontWeight:700}}>{label}</label>
      {children}
    </div>
  );
}
function UploadBtn({label,accept,onFile,uploading,preview,isVideo}){
  return(
    <div>
      <div className="upload-area" style={{opacity:uploading?0.6:1}}>
        <div style={{pointerEvents:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:6,color:'#888'}}>
          <Ico.Upload/>
          <span style={{fontSize:12,fontWeight:600}}>{uploading?'Caricamento...':label}</span>
          <span style={{fontSize:10,color:'#bbb'}}>Clicca o trascina</span>
        </div>
        {!uploading&&<input type="file" accept={accept} onChange={e=>{if(e.target.files[0])onFile(e.target.files[0]);e.target.value='';}}/>}
      </div>
      {preview&&(
        <div style={{marginTop:8,borderRadius:8,overflow:'hidden',aspectRatio:'4/5',background:'#000',maxWidth:120}}>
          {isVideo?<video src={preview} style={{width:'100%',height:'100%',objectFit:'cover'}} muted/>:<img src={preview} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>}
        </div>
      )}
    </div>
  );
}

/* ── POST VIEWER ── */
function PostViewer({post,onClose,onEdit,onDelete,clientId}){
  const[idx,setIdx]=useState(0);
  const[showSuggest,setShowSuggest]=useState(false);
  const[note,setNote]=useState('');
  const[feedbackSent,setFeedbackSent]=useState('');
  if(!post)return null;
  const slides=[];
  if(post.type==='video') slides.push({type:'video',src:post.video_url});
  else slides.push({type:'image',src:post.url});
  (post.slides||[]).forEach(s=>slides.push({type:'image',src:s.url}));
  const cur=slides[idx]||slides[0];

  async function sendApprove(){
    if(clientId){
      await sb.from('history').insert({client_id:clientId,date:today(),text:'Post approvato dal cliente','type':'feedback'});
    }
    setFeedbackSent('approved');
  }
  async function sendSuggest(){
    if(!note.trim())return;
    if(clientId){
      await sb.from('history').insert({client_id:clientId,date:today(),text:'Modifica richiesta: '+note.trim(),'type':'warning'});
    }
    setNote('');setShowSuggest(false);setFeedbackSent('suggested');
  }

  return(
    <div className="viewer-overlay" onClick={onClose}>
      <div className="viewer-box scale-in" onClick={e=>e.stopPropagation()}>
        <div className="viewer-media">
          {cur.type==='video'
            ?<video src={cur.src} controls autoPlay playsInline style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            :<img src={cur.src} alt="post"/>
          }
          {slides.length>1&&(
            <>
              <button className="car-btn prev" onClick={()=>setIdx(Math.max(0,idx-1))} disabled={idx===0}>&#8249;</button>
              <button className="car-btn next" onClick={()=>setIdx(Math.min(slides.length-1,idx+1))} disabled={idx===slides.length-1}>&#8250;</button>
              <div className="car-dots">{slides.map((_,i)=><div key={i} className={'car-dot'+(i===idx?' active':'')}/>)}</div>
            </>
          )}
          {post.type==='carousel'&&<div style={{position:'absolute',top:10,right:10,background:'rgba(0,0,0,.6)',color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4,fontWeight:700}}>{idx+1}/{slides.length}</div>}
          <button onClick={onClose} style={{position:'absolute',top:10,right:post.type==='carousel'?10:10,background:'rgba(0,0,0,.5)',border:'none',borderRadius:'50%',width:28,height:28,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',zIndex:10,top:10,right:slides.length>1?45:10}}><Ico.X s={14}/></button>
        </div>
        {post.caption&&(
          <div className="viewer-info">
            <p style={{fontSize:13,color:'#333',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{post.caption}</p>
          </div>
        )}
        {/* client feedback */}
        {clientId&&!feedbackSent&&(
          <div style={{padding:'12px 16px',borderTop:'1px solid #E8E4D9'}}>
            {!showSuggest?(
              <div style={{display:'flex',gap:8}}>
                <button onClick={sendApprove} style={{flex:1,background:'#EEF2EB',border:'1px solid #C4D4BC',borderRadius:8,padding:'10px',cursor:'pointer',fontSize:11,fontFamily:'Montserrat,sans-serif',fontWeight:700,color:'#5F6F52',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                  <Ico.Check/> Approvo
                </button>

        )}

/* ── FEED POST FORM ── */
function FeedPostForm({clientId,post,onSave,onCancel}){
  const[type,setType]=useState(post?post.type:'image');
  const[caption,setCaption]=useState(post?post.caption||'':'');
  const[coverUrl,setCoverUrl]=useState(post?post.url||'':'');
  const[videoUrl,setVideoUrl]=useState(post?post.video_url||'':'');
  const[slides,setSlides]=useState(post?[...(post.slides||[])].map(s=>({id:s.id,url:s.url})):[]);
  const[uploading,setUploading]=useState('');

  async function handleCoverFile(file){setUploading('cover');try{const url=await uploadFile(file,'covers');setCoverUrl(url);}catch(e){alert('Errore: '+e.message);}setUploading('');}
  async function handleVideoFile(file){setUploading('video');try{const url=await uploadFile(file,'videos');setVideoUrl(url);}catch(e){alert('Errore: '+e.message);}setUploading('');}
  async function handleSlideFile(file){setUploading('slide');try{const url=await uploadFile(file,'slides');setSlides(p=>[...p,{id:null,url}]);}catch(e){alert('Errore: '+e.message);}setUploading('');}
  function removeSlide(i){setSlides(p=>p.filter((_,j)=>j!==i));}

  async function save(){
    if(type==='image'&&!coverUrl){alert("Carica un'immagine");return;}
    if(type==='video'&&!videoUrl){alert('Carica un video');return;}
    if(type==='carousel'&&!coverUrl){alert('Carica almeno la cover');return;}
    await onSave({type,caption,url:coverUrl,video_url:videoUrl,slides});
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Field label="TIPO DI POST">
        <div style={{display:'flex',gap:8}}>
          {[['image','Foto'],['video','Video/Reel'],['carousel','Carosello']].map(([v,l])=>(
            <button key={v} className={'type-btn'+(type===v?' active':'')} onClick={()=>setType(v)} type="button">
              {v==='image'&&<Ico.Photo/>}{v==='video'&&<Ico.Video/>}{v==='carousel'&&<Ico.Carousel/>}
              <span style={{fontSize:10}}>{l}</span>
            </button>
          ))}
        </div>
      </Field>
      {(type==='image'||type==='carousel')&&(
        <Field label={type==='carousel'?'IMMAGINE COVER':'IMMAGINE'}>
          <UploadBtn label="Carica immagine" accept="image/*" onFile={handleCoverFile} uploading={uploading==='cover'} preview={coverUrl} isVideo={false}/>
        </Field>
      )}
      {type==='video'&&(
        <>
          <Field label="VIDEO (MP4, MOV)">
            <UploadBtn label="Carica video" accept="video/*" onFile={handleVideoFile} uploading={uploading==='video'} preview={videoUrl} isVideo={true}/>
          </Field>
          <Field label="COPERTINA GRIGLIA (opzionale)">
            <UploadBtn label="Carica copertina" accept="image/*" onFile={handleCoverFile} uploading={uploading==='cover'} preview={coverUrl} isVideo={false}/>
          </Field>
        </>
      )}
      {type==='carousel'&&(
        <Field label="SLIDE AGGIUNTIVE">
          <div className="slide-thumb-row" style={{marginBottom:8}}>
            {slides.map((s,i)=>(
              <div key={i} className="slide-thumb">
                <img src={s.url} alt=""/>
                <button className="slide-del" onClick={()=>removeSlide(i)}><Ico.X s={8}/></button>
              </div>
            ))}
          </div>
          <UploadBtn label="Aggiungi slide" accept="image/*,video/*" onFile={handleSlideFile} uploading={uploading==='slide'} preview={null}/>
        </Field>
      )}
      <Field label="CAPTION">
        <textarea className="input-field" rows={4} placeholder="Scrivi la caption..." value={caption} onChange={e=>setCaption(e.target.value)} style={{resize:'vertical'}}/>
      </Field>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button className="btn-ghost" onClick={onCancel} style={{width:'auto'}}>Annulla</button>
        <button className="btn-primary" onClick={save} style={{width:'auto',padding:'12px 24px'}} disabled={uploading!==''}>
          {uploading?'Caricamento...':'SALVA'}
        </button>
      </div>
    </div>
  );
}

/* ── DATA ── */
async function fetchFeed(clientId,publishedOnly){
  let q=sb.from('instagram_feed').select('*').eq('client_id',clientId).order('position',{ascending:true});
  if(publishedOnly)q=q.eq('published',true);
  const{data:posts}=await q;
  if(!posts||posts.length===0)return[];
  const{data:allSlides}=await sb.from('feed_slides').select('*').in('post_id',posts.map(p=>p.id)).order('position',{ascending:true});
  return posts.map(p=>({...p,slides:(allSlides||[]).filter(s=>s.post_id===p.id)}));
}
async function getClientFull(id){
  const[{data:c},{data:del},{data:req},{data:doc},{data:hist}]=await Promise.all([
    sb.from('clients').select('*').eq('id',id).maybeSingle(),
    sb.from('deliverables').select('*').eq('client_id',id),
    sb.from('requests').select('*').eq('client_id',id).order('created_at',{ascending:false}),
    sb.from('documents').select('*').eq('client_id',id).order('created_at',{ascending:false}),
    sb.from('history').select('*').eq('client_id',id).order('created_at',{ascending:false}),
  ]);
  return{...c,deliverables:del||[],requests:req||[],documents:doc||[],history:hist||[]};
}
async function addHistory(clientId,text,type){
  await sb.from('history').insert({client_id:clientId,date:today(),text,type});
}

/* ══ LOGIN ══ */
function Login({onLogin}){
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  async function submit(e){
    e.preventDefault();setErr('');setLoading(true);
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setErr('Email o password non corretti.');setLoading(false);return;}
    const user=data.user;
    if(user.email===ADMIN_EMAIL){onLogin('admin',null);setLoading(false);return;}
    let{data:client}=await sb.from('clients').select('*').eq('user_id',user.id).maybeSingle();
    if(!client){
      const{data:byEmail}=await sb.from('clients').select('*').eq('email',user.email).maybeSingle();
      if(byEmail){await sb.from('clients').update({user_id:user.id}).eq('id',byEmail.id);client=byEmail;}
    }
    if(client){onLogin('client',client.id);}
    else{setErr('Account non associato. Contatta lo studio.');await sb.auth.signOut();}
    setLoading(false);
  }
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#FDFCF8',padding:16}}>
      <div className="fade-up" style={{background:'#fff',border:'1px solid #E8E4D9',width:'100%',maxWidth:420,padding:'52px 44px',textAlign:'center',boxShadow:'0 4px 40px rgba(0,0,0,.04)'}}>
        <div style={{marginBottom:32}}>
          <div style={{width:44,height:44,border:'1px solid #D4CFC4',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
            <span className="serif" style={{fontSize:22,color:'#5F6F52',fontStyle:'italic'}}>m</span>
          </div>
          <h1 className="serif" style={{fontSize:26,marginBottom:4}}>Area Riservata</h1>
          <p style={{fontSize:11,color:'#A0A09A',letterSpacing:'.06em'}}>MIREA STUDIO</p>
        </div>
        <form onSubmit={submit} style={{textAlign:'left'}}>
          <Field label="EMAIL"><input className="input-field" type="email" placeholder="La tua email" value={email} onChange={e=>setEmail(e.target.value)} required/></Field>
          <Field label="PASSWORD"><input className="input-field" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} required/></Field>
          {err&&<p style={{fontSize:12,color:'#b94a40',marginBottom:12,textAlign:'center'}}>{err}</p>}
          <button className="btn-primary" type="submit" disabled={loading} style={{marginTop:4}}>{loading?'...':'ACCEDI'}</button>
        </form>
      </div>
    </div>
  );
}

/* ══ CLIENT DASHBOARD ══ */
function ClientDash({clientId,onLogout}){
  const[c,setC]=useState(null);
  const[feed,setFeed]=useState([]);
  const[tab,setTab]=useState('overview');
  const[reqForm,setReqForm]=useState({type:'Grafica Extra',desc:''});
  const[reqSent,setReqSent]=useState(false);
  const[payDone,setPayDone]=useState(false);
  const[viewDoc,setViewDoc]=useState(null);
  const[viewPost,setViewPost]=useState(null);

  async function load(){const d=await getClientFull(clientId);setC(d);const f=await fetchFeed(clientId,true);setFeed(f);}
  useEffect(()=>{load();},[clientId]);
  if(!c)return<span className="spinner"/>;

  const pendingDocs=(c.documents||[]).filter(d=>d.status==='pending').length;
  const toPay=(c.requests||[]).filter(r=>r.status==='approved'&&r.payment_amount>0&&c.extra_status==='DA SALDARE');

  async function sendReq(e){
    e.preventDefault();if(!reqForm.desc.trim())return;
    await sb.from('requests').insert({client_id:clientId,date:today(),type:reqForm.type,description:reqForm.desc,status:'pending'});
    await addHistory(clientId,'Nuova richiesta: '+reqForm.type,'request');
    setReqForm({type:'Grafica Extra',desc:''});setReqSent(true);setTimeout(()=>setReqSent(false),3000);load();
  }
  async function confirmPay(){
    const types=toPay.map(r=>r.type).join(', ');
    await addHistory(clientId,'Pagamento effettuato: '+types,'extra');
    setPayDone(true);
  }
  async function docAction(docId,action){
    const doc=(c.documents||[]).find(d=>d.id===docId);if(!doc)return;
    await sb.from('documents').update({status:action}).eq('id',docId);
    await addHistory(clientId,(action==='approved'?'Approvato':'Rifiutato')+': '+doc.title,action==='approved'?'delivery':'warning');
    setViewDoc(null);load();
  }

  const rl=(s)=>({pending:['IN ATTESA','tag-yellow'],approved:['APPROVATO','tag-green'],rejected:['RIFIUTATO','tag-red'],done:['COMPLETATO','tag-green']})[s]||[s,'tag-gray'];
  const dl=(s)=>({pending:['DA APPROVARE','tag-yellow'],approved:['APPROVATO','tag-green'],rejected:['RIFIUTATO','tag-red']})[s]||[s,'tag-gray'];
  const tabs=[
    {id:'overview',label:'LAVORI',icon:<Ico.Work/>},
    {id:'docs',label:'DOCUMENTI'+(pendingDocs>0?' ('+pendingDocs+')':''),icon:<Ico.File/>},
    {id:'social',label:'FEED IG',icon:<Ico.IG/>},
    {id:'requests',label:'RICHIESTE',icon:<Ico.Bell/>},

        <Logo/>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:12,color:'#888'}}>{c.name}</span>
          <button onClick={onLogout} style={{background:'none',border:'none',cursor:'pointer',color:'#888',display:'flex',alignItems:'center',gap:5,fontSize:11,fontFamily:'Montserrat,sans-serif'}}><Ico.Out/> ESCI</button>
        </div>
      </div>
      <div style={{maxWidth:820,margin:'0 auto',padding:'36px 20px'}} className="client-content">
        <div className="fade-up" style={{marginBottom:32}}>
          <h2 className="serif" style={{fontSize:32,marginBottom:4}}>Ciao, {c.name.split(' ')[0]}.</h2>
          <p style={{fontSize:12,color:'#888'}}>{c.plan} · Rinnovo: {c.renewal}</p>
        </div>
        {c.extra_balance>0&&c.extra_status==='DA SALDARE'&&(
          <div style={{marginBottom:24,border:'1px solid #F0E0B8',background:'#FFFCF5'}}>
            <div style={{background:'#FDF3DC',borderBottom:'1px solid #F0E0B8',padding:'12px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:16,fontFamily:'Playfair Display,serif',color:'#a07838',fontWeight:600}}>€{parseFloat(c.extra_balance).toFixed(2)} da saldare</span>
              <span className="tag tag-yellow">DA SALDARE</span>
            </div>
            {toPay.map(r=>(
              <div key={r.id} style={{padding:'14px 20px',borderBottom:'1px solid #F5EDD6'}}>
                <p style={{fontWeight:700,fontSize:13,marginBottom:3}}>{r.type} — €{parseFloat(r.payment_amount).toFixed(2)}</p>
                {r.payment_method&&<p style={{fontSize:12,color:'#555'}}>{r.payment_method}: <strong>{r.payment_details}</strong></p>}
              </div>

            <div style={{padding:'14px 20px'}}>

          <div className="fade-up card" style={{padding:'28px'}}>
            <p style={{fontSize:10,letterSpacing:'.14em',color:'#888',fontWeight:700,marginBottom:20}}>CRONOLOGIA</p>
            {(c.history||[]).length===0&&<p style={{fontSize:12,color:'#888'}}>Nessuna attività.</p>}
            {(c.history||[]).map(h=>(
              <div key={h.id} className="history-item">
                <HDot type={h.type}/>
                <p style={{fontSize:12,fontWeight:500}}>{h.text}</p>
                <p style={{fontSize:10,color:'#A0A09A',marginTop:2}}>{h.date}</p>
              </div>
            ))}
          </div>
        )}
      </div>

      {viewPost&&<PostViewer post={viewPost} onClose={()=>setViewPost(null)} clientId={clientId}/>}

      <Modal open={!!viewDoc} onClose={()=>setViewDoc(null)} title={viewDoc?viewDoc.title||'':''}>
        {viewDoc&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {viewDoc.url&&<a href={viewDoc.url} target="_blank" rel="noopener" style={{fontSize:11,color:'#3a4a7a',textAlign:'right',display:'block'}}>Apri / Scarica</a>}
            <div style={{background:'#F5F4F0',minHeight:200,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:4}}>
              {viewDoc.url?<iframe src={viewDoc.url} style={{width:'100%',height:360,border:'none'}} title="doc"/>:<p style={{fontSize:12,color:'#888'}}>Nessun file</p>}
            </div>
            {viewDoc.status==='pending'&&(
              <div style={{background:'#FFFCF5',border:'1px solid #F0E0B8',padding:'14px'}}>
                <p style={{fontSize:11,fontWeight:600,color:'#a07838',textAlign:'center',marginBottom:10}}>Questo documento richiede la tua approvazione.</p>
                <div style={{display:'flex',gap:10}}>
                  <button className="btn-danger" style={{flex:1}} onClick={()=>docAction(viewDoc.id,'rejected')}>RIFIUTA</button>
                  <button className="btn-primary" style={{flex:1,width:'auto'}} onClick={()=>docAction(viewDoc.id,'approved')}>APPROVA</button>
                </div>
              </div>
            )}
            {viewDoc.status==='approved'&&<div style={{background:'#EEF2EB',border:'1px solid #C4D4BC',padding:'10px',textAlign:'center',color:'#5F6F52',fontSize:11,fontWeight:700}}>Approvato</div>}
            {viewDoc.status==='rejected'&&<div style={{background:'#FDF0EE',border:'1px solid #e0b0aa',padding:'10px',textAlign:'center',color:'#b94a40',fontSize:11,fontWeight:700}}>Rifiutato</div>}
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ══ ADMIN DASHBOARD ══ */
function AdminDash({onLogout}){
  const[clients,setClients]=useState([]);
  const[tab,setTab]=useState('clients');
  const[selId,setSelId]=useState(null);
  const[sel,setSel]=useState(null);
  const[subTab,setSubTab]=useState('overview');
  const[loading,setLoading]=useState(true);
  const[subLoading,setSubLoading]=useState(false);
  const[feed,setFeed]=useState([]);
  const[viewPost,setViewPost]=useState(null);
  const[editPost,setEditPost]=useState(null);
  const[showNewPost,setShowNewPost]=useState(false);
  const[dragIdx,setDragIdx]=useState(null);
  const[mNewClient,setMNewClient]=useState(false);
  const[mEditClient,setMEditClient]=useState(false);
  const[mAddDel,setMAddDel]=useState(false);
  const[mApprove,setMApprove]=useState(null);
  const[fClient,setFClient]=useState({name:'',email:'',plan:'',contract_notes:'',renewal:'',month:''});
  const[fEdit,setFEdit]=useState({});
  const[fDel,setFDel]=useState({label:'',total:4});
  const[fApprove,setFApprove]=useState({price:'',method:'Bonifico Bancario',details:'',note:''});
  const[fNote,setFNote]=useState('');
  const[fDoc,setFDoc]=useState({title:'',url:''});

  async function loadClients(){
    setLoading(true);
    const{data}=await sb.from('clients').select('*').order('created_at',{ascending:false});
    const list=data||[];
    const withPending=await Promise.all(list.map(async c=>{
      const{count}=await sb.from('requests').select('*',{count:'exact',head:true}).eq('client_id',c.id).eq('status','pending');
      return{...c,_pending:count||0};
    }));
    setClients(withPending);setLoading(false);
  }
  async function loadSel(id){
    setSubLoading(true);
    const d=await getClientFull(id);setSel(d);
    const f=await fetchFeed(id,false);setFeed(f);
    setSubLoading(false);
  }
  useEffect(()=>{loadClients();},[]);
  useEffect(()=>{if(selId)loadSel(selId);else{setSel(null);setFeed([]);}},[selId]);
  const totalPending=clients.reduce((a,c)=>a+(c._pending||0),0);

  async function createClient(e){
    e.preventDefault();
    const{data:row,error}=await sb.from('clients').insert({user_id:null,name:fClient.name,email:fClient.email,plan:fClient.plan,contract_notes:fClient.contract_notes,renewal:fClient.renewal,month:fClient.month,extra_balance:0,extra_status:'SALDATO'}).select().maybeSingle();
    if(error){alert('Errore: '+error.message);return;}
    setMNewClient(false);setFClient({name:'',email:'',plan:'',contract_notes:'',renewal:'',month:''});
    loadClients();
  }
  async function saveEdit(e){
    e.preventDefault();
    await sb.from('clients').update(fEdit).eq('id',selId);
    setMEditClient(false);loadSel(selId);
  }
  async function delClient(id){
    if(!confirm('Eliminare questo cliente?'))return;
    await sb.from('clients').delete().eq('id',id);
    if(selId===id)setSelId(null);
    loadClients();
  }
  async function addDel(e){
    e.preventDefault();
    const{data:row}=await sb.from('deliverables').insert({client_id:selId,label:fDel.label,used:0,total:parseInt(fDel.total)||4}).select().maybeSingle();
    setMAddDel(false);setFDel({label:'',total:4});
    setSel(prev=>({...prev,deliverables:[...(prev.deliverables||[]),{id:row.id,label:fDel.label,used:0,total:parseInt(fDel.total)||4}]}));
  }
  async function removeDel(dId){
    const d=(sel.deliverables||[]).find(x=>x.id===dId);
    await sb.from('deliverables').delete().eq('id',dId);
    setSel(prev=>({...prev,deliverables:prev.deliverables.filter(x=>x.id!==dId)}));
  }
  async function updateUsed(dId,delta){
    const d=(sel.deliverables||[]).find(x=>x.id===dId);if(!d)return;
    const nu=Math.max(0,Math.min(d.total,d.used+delta));
    await sb.from('deliverables').update({used:nu}).eq('id',dId);
    if(delta>0) await addHistory(selId,'Consegnato: '+d.label+' ('+nu+'/'+d.total+')','delivery');
    setSel(prev=>({...prev,deliverables:prev.deliverables.map(x=>x.id===dId?{...x,used:nu}:x)}));
  }
  async function updateTotal(dId,delta){
    const d=(sel.deliverables||[]).find(x=>x.id===dId);if(!d)return;
    const nt=Math.max(0,d.total+delta);
    await sb.from('deliverables').update({total:nt}).eq('id',dId);
    setSel(prev=>({...prev,deliverables:prev.deliverables.map(x=>x.id===dId?{...x,total:nt}:x)}));
  }
  async function approveReq(e){
    e.preventDefault();
    const r=(sel.requests||[]).find(x=>x.id===mApprove);if(!r)return;
    const p=parseFloat(fApprove.price)||0;
    const upd={status:'approved'};
    if(p>0){upd.payment_amount=p;upd.payment_method=fApprove.method;upd.payment_details=fApprove.details;upd.payment_note=fApprove.note;}
    await sb.from('requests').update(upd).eq('id',mApprove);
    if(p>0)await sb.from('clients').update({extra_balance:(sel.extra_balance||0)+p,extra_status:'DA SALDARE'}).eq('id',selId);
    await addHistory(selId,'Richiesta approvata: '+r.type+(p>0?' — €'+p.toFixed(2):''),'extra');
    setMApprove(null);setFApprove({price:'',method:'Bonifico Bancario',details:'',note:''});
    loadSel(selId);loadClients();
  }
  async function rejectReq(rId){
    const r=(sel.requests||[]).find(x=>x.id===rId);if(!r)return;
    await sb.from('requests').update({status:'rejected'}).eq('id',rId);
    await addHistory(selId,'Richiesta rifiutata: '+r.type,'warning');
    loadSel(selId);loadClients();
  }
  async function markPaid(){
    await sb.from('clients').update({extra_status:'SALDATO',extra_balance:0}).eq('id',selId);
    await addHistory(selId,'Extra saldato','extra');
    loadSel(selId);loadClients();
  }
  async function addNote(e){
    e.preventDefault();if(!fNote.trim())return;
    await addHistory(selId,fNote.trim(),'admin');
    setFNote('');loadSel(selId);
  }
  async function addDoc(e){
    e.preventDefault();if(!fDoc.title||!fDoc.url)return;
    await sb.from('documents').insert({client_id:selId,title:fDoc.title,url:fDoc.url,status:'pending',date:today()});
    await addHistory(selId,'Documento caricato: '+fDoc.title,'admin');
    setFDoc({title:'',url:''});loadSel(selId);
  }
  async function delDoc(id){await sb.from('documents').delete().eq('id',id);loadSel(selId);}

  async function saveFeedPost({type,caption,url,video_url,slides}){
    const pos=feed.length;
    if(editPost){
      await sb.from('instagram_feed').update({type,caption,url,video_url}).eq('id',editPost.id);
      await sb.from('feed_slides').delete().eq('post_id',editPost.id);
      if(slides&&slides.length>0) await sb.from('feed_slides').insert(slides.map((s,i)=>({post_id:editPost.id,url:s.url,position:i})));
    }else{
      const{data:row}=await sb.from('instagram_feed').insert({client_id:selId,type,caption,url,video_url,published:false,position:pos}).select().maybeSingle();
      if(row&&slides&&slides.length>0) await sb.from('feed_slides').insert(slides.map((s,i)=>({post_id:row.id,url:s.url,position:i})));
    }
    setShowNewPost(false);setEditPost(null);
    const f=await fetchFeed(selId,false);setFeed(f);
  }
  async function togglePublish(post){
    await sb.from('instagram_feed').update({published:!post.published}).eq('id',post.id);
    const f=await fetchFeed(selId,false);setFeed(f);
  }
  async function publishAll(){
    await sb.from('instagram_feed').update({published:true}).eq('client_id',selId);
    await addHistory(selId,'Feed aggiornato','admin');
    const f=await fetchFeed(selId,false);setFeed(f);
  }
  async function deleteFeedPost(postId){
    if(!confirm('Eliminare?'))return;
    await sb.from('feed_slides').delete().eq('post_id',postId);
    await sb.from('instagram_feed').delete().eq('id',postId);
    const f=await fetchFeed(selId,false);setFeed(f);
  }
  async function dropFeedPost(e,targetIdx){
    e.preventDefault();
    if(dragIdx===null||dragIdx===targetIdx)return;
    const newFeed=[...feed];
    const item=newFeed[dragIdx];
    newFeed.splice(dragIdx,1);newFeed.splice(targetIdx,0,item);
    await Promise.all(newFeed.map((p,i)=>sb.from('instagram_feed').update({position:i}).eq('id',p.id)));
    setDragIdx(null);
    const f=await fetchFeed(selId,false);setFeed(f);
  }

  const rl=(s)=>({pending:['IN ATTESA','tag-yellow'],approved:['APPROVATO','tag-green'],rejected:['RIFIUTATO','tag-red']})[s]||[s,'tag-gray'];
  const isMobile = typeof window !== 'undefined' && window.innerWidth <= 640;
  if(loading)return<span className="spinner"/>;

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {!isMobile&&<div className="sidebar">
        <div style={{padding:'24px 20px',borderBottom:'1px solid rgba(255,255,255,.08)'}}>
          <p className="serif" style={{fontSize:15,color:'#fff'}}>Mirea Studio</p>
          <p style={{fontSize:9,color:'#555',letterSpacing:'.1em',marginTop:2}}>ADMIN</p>
        </div>
        <nav style={{flex:1,paddingTop:12}}>
          {[{id:'clients',label:'Clienti',icon:<Ico.Users/>},{id:'requests',label:'Richieste'+(totalPending>0?' ('+totalPending+')':''),icon:<Ico.Bell/>},{id:'history',label:'Cronologia',icon:<Ico.Clock/>}].map(t=>(
            <div key={t.id} className={'sidebar-item'+(tab===t.id?' active':'')} onClick={()=>{setTab(t.id);setSelId(null);}}>
              {t.icon}{t.label}
            </div>
          ))}
        </nav>
        <div style={{padding:'14px 20px'}}>
          <button onClick={onLogout} style={{background:'none',border:'none',color:'#555',display:'flex',gap:6,fontSize:11,cursor:'pointer',fontFamily:'Montserrat,sans-serif'}}><Ico.Out/> ESCI</button>
        </div>
      </div>}

      {isMobile&&<div className="mobile-nav">
        <div className="mobile-nav-inner">
          <p className="serif" style={{fontSize:14,color:'#fff'}}>Mirea Studio</p>
          <button onClick={onLogout} style={{background:'none',border:'none',color:'#666',fontSize:11,cursor:'pointer',fontFamily:'Montserrat,sans-serif',display:'flex',alignItems:'center',gap:5}}><Ico.Out/> Esci</button>
        </div>
        <div className="mobile-nav-items">
          {[{id:'clients',label:'Clienti',icon:<Ico.Users/>},{id:'requests',label:'Richieste'+(totalPending>0?' ('+totalPending+')':''),icon:<Ico.Bell/>},{id:'history',label:'Crono',icon:<Ico.Clock/>}].map(t=>(
            <button key={t.id} className={'mobile-nav-item'+(tab===t.id?' active':'')} onClick={()=>{setTab(t.id);setSelId(null);}}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>
      </div>}

      <div style={{flex:1,overflow:'auto',padding:'32px 36px',maxWidth:1000}} className="admin-main">

        {tab==='clients'&&!selId&&(
          <div className="fade-up">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>
              <h2 className="serif" style={{fontSize:28}}>Clienti</h2>
              <button className="btn-ghost" onClick={()=>setMNewClient(true)} style={{display:'flex',alignItems:'center',gap:6,width:'auto'}}><Ico.Plus s={13}/> NUOVO CLIENTE</button>
            </div>
            {clients.length===0&&<p style={{fontSize:12,color:'#888'}}>Nessun cliente. Creane uno!</p>}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
              {clients.map(c=>(
                <div key={c.id} className="card" style={{padding:'24px',cursor:'pointer'}} onClick={()=>{setSelId(c.id);setSubTab('overview');}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                    <h3 className="serif" style={{fontSize:18}}>{c.name}</h3>
                    <button onClick={e=>{e.stopPropagation();delClient(c.id)}} style={{background:'none',border:'none',cursor:'pointer',color:'#ccc'}}><Ico.Trash/></button>
                  </div>
                  <p style={{fontSize:11,color:'#888',marginBottom:2}}>{c.email}</p>
                  <p style={{fontSize:11,color:'#888',marginBottom:10}}>{c.plan}</p>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {c.month&&<span className="tag tag-gray">{c.month}</span>}
                    {c._pending>0&&<span className="tag tag-yellow">{c._pending} PENDING</span>}
                    {c.extra_balance>0&&<span className="tag tag-red">€{parseFloat(c.extra_balance).toFixed(2)} DA SALDARE</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==='clients'&&selId&&(
          <div className="fade-up">
            {subLoading||!sel?<span className="spinner"/>:(
              <>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <button onClick={()=>setSelId(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#888'}}><Ico.Back/></button>
                    <div><h2 className="serif" style={{fontSize:26}}>{sel.name}</h2><p style={{fontSize:11,color:'#888'}}>{sel.email}</p></div>
                  </div>
                  <button className="btn-ghost" onClick={()=>{setFEdit({name:sel.name,email:sel.email,plan:sel.plan,contract_notes:sel.contract_notes,renewal:sel.renewal,month:sel.month});setMEditClient(true);}} style={{width:'auto',display:'flex',alignItems:'center',gap:5,fontSize:10}}>
                    <Ico.Edit/> MODIFICA
                  </button>
                </div>
                <div style={{display:'flex',borderBottom:'1px solid #E8E4D9',marginBottom:24,overflowX:'auto'}}>
                  {['overview','docs','social','requests','extra','history'].map(t=>(
                    <button key={t} className={'tab-btn'+(subTab===t?' active':'')} onClick={()=>setSubTab(t)}>
                      {t.toUpperCase()}{t==='requests'&&(sel.requests||[]).filter(r=>r.status==='pending').length>0?' ('+(sel.requests||[]).filter(r=>r.status==='pending').length+')':''}
                    </button>
                  ))}
                </div>

                {subTab==='overview'&&(
                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                      <p style={{fontSize:10,letterSpacing:'.14em',color:'#888',fontWeight:700}}>DELIVERABLE — {sel.month}</p>
                      <button className="btn-ghost" onClick={()=>setMAddDel(true)} style={{width:'auto',display:'flex',alignItems:'center',gap:5,fontSize:10,padding:'7px 14px'}}><Ico.Plus s={12}/> AGGIUNGI</button>
                    </div>
                    {(sel.deliverables||[]).length===0&&<p style={{fontSize:12,color:'#888',marginBottom:16}}>Nessun deliverable.</p>}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:14,marginBottom:20}}>
                      {(sel.deliverables||[]).map(d=>(
                        <div key={d.id} className="card" style={{padding:'18px'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                            <span style={{fontWeight:600,fontSize:12}}>{d.label}</span>
                            <button onClick={()=>removeDel(d.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ccc'}}><Ico.Trash/></button>
                          </div>
                          <div style={{fontSize:26,fontFamily:'Playfair Display,serif',textAlign:'center',margin:'10px 0'}}>
                            {d.used}<span style={{fontSize:14,color:'#ccc'}}>/{d.total}</span>
                          </div>
                          <div className="progress-bar" style={{marginBottom:10}}>
                            <div className="progress-fill" style={{width:(d.total>0?(d.used/d.total)*100:0)+'%'}}/>
                          </div>
                          <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:6}}>
                            <button className="counter-btn" onClick={()=>updateUsed(d.id,-1)}>−</button>
                            <button className="counter-btn" onClick={()=>updateUsed(d.id,1)}>+</button>
                          </div>
                          <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:4,fontSize:10,color:'#aaa'}}>
                            <span>Tot:</span>
                            <button className="counter-btn" style={{width:22,height:22,fontSize:11}} onClick={()=>updateTotal(d.id,-1)}>−</button>
                            <span style={{fontSize:11,fontWeight:600,minWidth:16,textAlign:'center'}}>{d.total}</span>
                            <button className="counter-btn" style={{width:22,height:22,fontSize:11}} onClick={()=>updateTotal(d.id,1)}>+</button>
                          </div>
                        </div>
                      ))}
                    </div>
                    {sel.contract_notes&&<div className="info-box">{sel.contract_notes}</div>}
                  </div>
                )}

                {subTab==='docs'&&(
                  <div>
                    <div className="card" style={{padding:'24px',marginBottom:16}}>
                      <p style={{fontSize:10,letterSpacing:'.14em',color:'#888',fontWeight:700,marginBottom:10}}>CARICA DOCUMENTO</p>
                      <form onSubmit={addDoc} style={{display:'flex',flexDirection:'column',gap:8}}>
                        <input className="input-field" placeholder="Titolo" value={fDoc.title} onChange={e=>setFDoc(p=>({...p,title:e.target.value}))} required/>
                        <input className="input-field" placeholder="URL Google Drive..." value={fDoc.url} onChange={e=>setFDoc(p=>({...p,url:e.target.value}))} required/>
                        <button className="btn-primary" type="submit" style={{width:'auto',padding:'12px 20px'}}>CARICA</button>
                      </form>
                    </div>
                    <div className="card" style={{padding:'24px'}}>
                      {(sel.documents||[]).length===0&&<p style={{fontSize:12,color:'#888'}}>Nessun documento.</p>}
                      <div style={{display:'flex',flexDirection:'column',gap:8}}>
                        {(sel.documents||[]).map(d=>(
                          <div key={d.id} style={{border:'1px solid #E8E4D9',padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                            <div><span style={{fontWeight:600,fontSize:12}}>{d.title}</span><span style={{marginLeft:8,fontSize:10,color:'#888'}}>{d.status}</span></div>
                            <button onClick={()=>delDoc(d.id)} style={{background:'none',border:'none',color:'#c0392b',cursor:'pointer'}}><Ico.Trash/></button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {subTab==='social'&&(
                  <div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
                      <div>
                        <p style={{fontSize:10,letterSpacing:'.14em',color:'#888',fontWeight:700}}>GESTIONE FEED</p>
                        <p style={{fontSize:11,color:'#aaa',marginTop:2}}>{feed.filter(p=>p.published).length} pubblicati · {feed.filter(p=>!p.published).length} bozze · trascina per riordinare</p>
                      </div>
                      <div style={{display:'flex',gap:8}}>
                        {feed.some(p=>!p.published)&&(
                          <button className="btn-success" onClick={publishAll} style={{width:'auto',display:'flex',alignItems:'center',gap:5,fontSize:10}}>
                            <Ico.Eye/> Pubblica tutto
                          </button>
                        )}
                        <button className="btn-primary" onClick={()=>setShowNewPost(true)} style={{width:'auto',padding:'10px 16px',display:'flex',alignItems:'center',gap:5,fontSize:11}}>
                          <Ico.Plus s={12}/> Nuovo post
                        </button>
                      </div>
                    </div>
                    <IGWrapper actions={<span style={{fontSize:10,color:'#888'}}>{feed.filter(p=>p.published).length} visibili</span>}>
                      {feed.length===0
                        ?<div style={{padding:'40px',textAlign:'center',color:'#888',fontSize:12}}>Nessun post ancora.</div>
                        :<div className="feed-grid" style={{padding:'2px 0'}}>
                          {feed.map((post,idx)=>{
                            const thumb=post.url||(post.type==='video'?post.video_url:'');
                            return(
                              <div key={post.id} className="feed-cell"
                                draggable
                                onDragStart={e=>{e.stopPropagation();setDragIdx(idx);}}
                                onDragOver={e=>e.preventDefault()}
                                onDrop={e=>dropFeedPost(e,idx)}
                                onDragEnd={()=>setDragIdx(null)}
                                onClick={()=>{if(dragIdx===null)setViewPost(post);}}
                                style={{opacity:dragIdx===idx?0.4:1,cursor:dragIdx!==null?'grabbing':'pointer'}}>
                                {thumb?(post.type==='video'&&!post.url
                                  ?<video src={post.video_url} muted style={{width:'100%',height:'100%',objectFit:'cover',position:'absolute',inset:0}}/>
                                  :<img src={thumb} alt=""/>)
                                :<div style={{position:'absolute',inset:0,background:'#F5F4F0',display:'flex',alignItems:'center',justifyContent:'center',color:'#ccc',fontSize:10}}>No img</div>}
                                {!post.published&&<div className="feed-draft">BOZZA</div>}
                                {post.type==='video'&&<div className="feed-badge"><Ico.Play/></div>}
                                {post.type==='carousel'&&<div className="feed-badge">≡</div>}
                              </div>
                            );
                          })}
                        </div>
                      }
                    </IGWrapper>
                  </div>
                )}

                {subTab==='requests'&&(
                  <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {(sel.requests||[]).length===0&&<p style={{fontSize:12,color:'#888'}}>Nessuna richiesta.</p>}
                    {(sel.requests||[]).map(r=>{
                      const[lbl,cls]=rl(r.status);
                      return(
                        <div key={r.id} className="card" style={{padding:'18px 20px'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
                            <div>
                              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                                <span style={{fontWeight:600,fontSize:13}}>{r.type}</span>
                                <span className={'tag '+cls}>{lbl}</span>
                              </div>
                              <p style={{fontSize:11,color:'#555',marginBottom:2}}>{r.description}</p>
                              <p style={{fontSize:10,color:'#A0A09A'}}>{r.date}</p>
                            </div>
                            {r.status==='pending'&&(
                              <div style={{display:'flex',gap:8}}>
                                <button className="btn-success" onClick={()=>setMApprove(r.id)}>APPROVA</button>
                                <button className="btn-danger" onClick={()=>rejectReq(r.id)}>RIFIUTA</button>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {subTab==='extra'&&(
                  <div className="card" style={{padding:'24px'}}>
                    <p style={{fontSize:10,letterSpacing:'.14em',color:'#888',fontWeight:700,marginBottom:16}}>SALDO EXTRA</p>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
                      <div>
                        <p style={{fontSize:34,fontFamily:'Playfair Display,serif'}}>€{parseFloat(sel.extra_balance||0).toFixed(2)}</p>
                        <span className={'tag '+(sel.extra_status==='SALDATO'?'tag-green':'tag-red')}>{sel.extra_status}</span>
                      </div>
                      {sel.extra_balance>0&&sel.extra_status!=='SALDATO'&&(
                        <button className="btn-success" onClick={markPaid} style={{width:'auto'}}>SEGNA COME SALDATO</button>
                      )}
                    </div>
                  </div>
                )}

                {subTab==='history'&&(
                  <div>
                    <div className="card" style={{padding:'20px',marginBottom:14}}>
                      <form onSubmit={addNote} style={{display:'flex',gap:8}}>
                        <input className="input-field" style={{flex:1}} placeholder="Aggiungi nota..." value={fNote} onChange={e=>setFNote(e.target.value)}/>
                        <button className="btn-ghost" type="submit" style={{width:'auto',padding:'12px 16px',whiteSpace:'nowrap'}}>+ NOTA</button>
                      </form>
                    </div>
                    <div className="card" style={{padding:'24px'}}>
                      {(sel.history||[]).length===0&&<p style={{fontSize:12,color:'#888'}}>Nessuna attività.</p>}
                      {(sel.history||[]).map(h=>(
                        <div key={h.id} className="history-item">
                          <HDot type={h.type}/>
                          <p style={{fontSize:12,fontWeight:500}}>{h.text}</p>
                          <p style={{fontSize:10,color:'#A0A09A',marginTop:2}}>{h.date}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {tab==='requests'&&(
          <div className="fade-up">
            <h2 className="serif" style={{fontSize:28,marginBottom:24}}>Tutte le Richieste</h2>
            {clients.every(c=>c._pending===0)&&<p style={{fontSize:12,color:'#888'}}>Nessuna richiesta in attesa.</p>}
            {clients.filter(c=>c._pending>0).map(c=>(
              <div key={c.id} style={{marginBottom:20}}>
                <p style={{fontSize:11,fontWeight:700,letterSpacing:'.1em',color:'#888',marginBottom:8}}>{c.name.toUpperCase()}</p>
                <button className="btn-ghost" onClick={()=>{setSelId(c.id);setSubTab('requests');setTab('clients');}} style={{width:'auto',fontSize:10,padding:'8px 16px'}}>
                  GESTISCI {c._pending} RICHIESTA{c._pending>1?'E':''}
                </button>
              </div>
            ))}
          </div>
        )}

        {tab==='history'&&(
          <div className="fade-up">
            <h2 className="serif" style={{fontSize:28,marginBottom:24}}>Cronologia</h2>
            <p style={{fontSize:12,color:'#888'}}>Seleziona un cliente per vedere la cronologia.</p>
          </div>
        )}
      </div>

      <Modal open={mNewClient} onClose={()=>setMNewClient(false)} title="Nuovo Cliente">
        <div className="info-box" style={{marginBottom:16}}>
          Crea prima l'utente su <strong>Supabase → Authentication → Users → Add user</strong>, poi compila qui.
        </div>
        <form onSubmit={createClient} style={{display:'flex',flexDirection:'column',gap:0}}>
          <Field label="NOME"><input className="input-field" placeholder="Es. Giulia Bianchi" value={fClient.name} onChange={e=>setFClient(p=>({...p,name:e.target.value}))} required/></Field>
          <Field label="EMAIL (uguale a Supabase Auth)"><input className="input-field" type="email" placeholder="giulia@esempio.it" value={fClient.email} onChange={e=>setFClient(p=>({...p,email:e.target.value}))} required/></Field>
          <Field label="PIANO"><input className="input-field" placeholder="Es. Contratto €400/mese" value={fClient.plan} onChange={e=>setFClient(p=>({...p,plan:e.target.value}))}/></Field>
          <Field label="MESE"><input className="input-field" placeholder="Es. Maggio 2026" value={fClient.month} onChange={e=>setFClient(p=>({...p,month:e.target.value}))}/></Field>
          <Field label="RINNOVO"><input className="input-field" placeholder="Es. 01 Giugno 2026" value={fClient.renewal} onChange={e=>setFClient(p=>({...p,renewal:e.target.value}))}/></Field>
          <Field label="NOTE CONTRATTO"><textarea className="input-field" rows={3} value={fClient.contract_notes} onChange={e=>setFClient(p=>({...p,contract_notes:e.target.value}))} style={{resize:'vertical'}}/></Field>
          <button className="btn-primary" type="submit" style={{marginTop:8}}>CREA PROFILO</button>
        </form>
      </Modal>

      <Modal open={mEditClient} onClose={()=>setMEditClient(false)} title={'Modifica — '+(sel?sel.name||'':'')}>
        <form onSubmit={saveEdit} style={{display:'flex',flexDirection:'column',gap:0}}>
          {[['NOME','name','text'],['EMAIL','email','email'],['PIANO','plan','text'],['MESE','month','text'],['RINNOVO','renewal','text']].map(([l,k,t])=>(
            <Field key={k} label={l}><input className="input-field" type={t} value={fEdit[k]||''} onChange={e=>setFEdit(p=>({...p,[k]:e.target.value}))}/></Field>
          ))}
          <Field label="NOTE"><textarea className="input-field" rows={3} value={fEdit.contract_notes||''} onChange={e=>setFEdit(p=>({...p,contract_notes:e.target.value}))} style={{resize:'vertical'}}/></Field>
          <button className="btn-primary" type="submit" style={{marginTop:8}}>SALVA</button>
        </form>
      </Modal>

      <Modal open={mAddDel} onClose={()=>setMAddDel(false)} title="Aggiungi Deliverable">
        <form onSubmit={addDel} style={{display:'flex',flexDirection:'column',gap:0}}>
          <Field label="NOME"><input className="input-field" placeholder="Es. Grafiche, Video Reel" value={fDel.label} onChange={e=>setFDel(p=>({...p,label:e.target.value}))} required/></Field>
          <Field label="QUANTITÀ TOTALE"><input className="input-field" type="number" min="1" value={fDel.total} onChange={e=>setFDel(p=>({...p,total:e.target.value}))} required/></Field>
          <button className="btn-primary" type="submit" style={{marginTop:8}}>AGGIUNGI</button>
        </form>
      </Modal>

      <Modal open={!!mApprove} onClose={()=>setMApprove(null)} title="Approva Richiesta">
        <form onSubmit={approveReq} style={{display:'flex',flexDirection:'column',gap:0}}>
          <Field label="IMPORTO EXTRA (€) — 0 se incluso">
            <input className="input-field" type="number" min="0" step="0.01" placeholder="0.00" value={fApprove.price} onChange={e=>setFApprove(p=>({...p,price:e.target.value}))}/>
          </Field>
          {parseFloat(fApprove.price)>0&&(
            <>
              <Field label="METODO">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {['Bonifico Bancario','PayPal','Stripe / Carta','Satispay','Contanti'].map(m=>(
                    <button key={m} type="button" onClick={()=>setFApprove(p=>({...p,method:m}))}
                      style={{padding:'9px 6px',fontSize:11,fontFamily:'Montserrat,sans-serif',fontWeight:600,border:fApprove.method===m?'2px solid #1A1A1A':'1px solid #E8E4D9',background:fApprove.method===m?'#1A1A1A':'#fff',color:fApprove.method===m?'#fff':'#555',cursor:'pointer',gridColumn:m==='Contanti'?'1/-1':''}}>
                      {m}
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="DETTAGLI"><input className="input-field" value={fApprove.details} onChange={e=>setFApprove(p=>({...p,details:e.target.value}))}/></Field>
              <Field label="CAUSALE"><input className="input-field" value={fApprove.note} onChange={e=>setFApprove(p=>({...p,note:e.target.value}))}/></Field>
            </>
          )}
          <button className="btn-primary" type="submit" style={{marginTop:12}}>CONFERMA</button>
        </form>
      </Modal>

      <Modal open={showNewPost} onClose={()=>{setShowNewPost(false);setEditPost(null);}} title={editPost?'Modifica Post':'Nuovo Post'} wide>
        <FeedPostForm clientId={selId} post={editPost} onSave={saveFeedPost} onCancel={()=>{setShowNewPost(false);setEditPost(null);}}/>
      </Modal>

      {viewPost&&<PostViewer post={viewPost} onClose={()=>setViewPost(null)}
        onEdit={()=>{setEditPost(viewPost);setViewPost(null);setShowNewPost(true);}}
        onDelete={()=>{if(confirm('Eliminare?')){deleteFeedPost(viewPost.id);setViewPost(null);}}}
      />}
    </div>
  );
}

/* ══ APP ══ */
function App(){
  const[session,setSession]=useState(null);
  const[checking,setChecking]=useState(true);

  async function handleSession(s){
    try{
      if(!s){setSession(null);return;}
      if(s.user.email===ADMIN_EMAIL){setSession({role:'admin'});return;}
      let{data:client}=await sb.from('clients').select('*').eq('user_id',s.user.id).maybeSingle();
      if(!client){
        const{data:byEmail}=await sb.from('clients').select('*').eq('email',s.user.email).maybeSingle();
        if(byEmail){await sb.from('clients').update({user_id:s.user.id}).eq('id',byEmail.id);client=byEmail;}
      }
      if(client)setSession({role:'client',clientId:client.id});
      else{setSession(null);await sb.auth.signOut();}
    }catch(e){console.error('handleSession:',e);setSession(null);}
    finally{setChecking(false);}
  }

  useEffect(()=>{
    let active=true;
    async function init(){
      try{const result=await sb.auth.getSession();if(active)await handleSession(result&&result.data?result.data.session:null);}
      catch(e){console.error(e);if(active)setChecking(false);}
    }
    init();
    let sub=null;
    try{const{data}=sb.auth.onAuthStateChange((_,s)=>{if(active)handleSession(s);});sub=data.subscription;}
    catch(e){console.error(e);}
    return()=>{active=false;if(sub)sub.unsubscribe();};
  },[]);

  async function logout(){try{await sb.auth.signOut();}catch(e){}setSession(null);}

  if(checking)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:16}}>
      <span className="spinner"/>
      <p style={{fontSize:11,color:'#aaa',fontFamily:'Montserrat,sans-serif'}}>Caricamento...</p>
    </div>
  );
  if(!session)return<Login onLogin={(role,clientId)=>setSession({role,clientId})}/>;
  if(session.role==='admin')return<AdminDash onLogout={logout}/>;
  if(session.role==='client')return<ClientDash clientId={session.clientId} onLogout={logout}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
